name: respiro
description: "Respiro - Micro-Breathing & Sensory Focus offline utility app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  sqflite: ^2.3.3+2
  just_audio: ^0.9.36
  vibration: ^2.1.0
  uuid: ^4.3.3
  path: ^1.9.0
  google_fonts: ^6.2.1
  intl: ^0.20.2
  url_launcher: ^6.3.0
  in_app_purchase: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/sounds/
